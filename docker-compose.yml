version: '3.8'

services:
  sync-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sync-engine
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - SYNC_SERVER_PORT=3000
      - SYNC_SERVER_HOST=0.0.0.0
      - SYNC_JWT_SECRET=change-me-in-production
      - SYNC_LOG_LEVEL=info
    volumes:
      - sync-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  sync-engine-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sync-engine-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - SYNC_SERVER_PORT=3000
      - SYNC_SERVER_HOST=0.0.0.0
      - SYNC_JWT_SECRET=dev-secret
      - SYNC_LOG_LEVEL=debug
    volumes:
      - sync-data-dev:/app/data
    profiles:
      - dev
    restart: unless-stopped

volumes:
  sync-data:
    driver: local
  sync-data-dev:
    driver: local
